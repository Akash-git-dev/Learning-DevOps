name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.113
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            /home/ubuntu/Learning-DevOps

             git pull origin main

             npm install

             pm2 restart 0
